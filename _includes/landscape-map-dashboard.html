<div class="landscape-map-dashboard" data-map-dashboard data-map-data-url="{{ '/assets/data/landscape-map.json' | relative_url }}">
  <div class="landscape-map-dashboard__intro">
    <p>
      See where DRI projects are building connections and creating impact.
    </p>
  </div>

  <div class="landscape-map-dashboard__controls">
    <div class="landscape-map-field">
      <span>Projects</span>
      <details class="landscape-map-multiselect" data-project-filter>
        <summary class="landscape-map-multiselect__summary" data-project-filter-summary>
          All projects
        </summary>
        <div class="landscape-map-multiselect__panel" data-project-filter-options>
          <p class="landscape-map-multiselect__empty">Loading projects...</p>
        </div>
      </details>
      <p class="landscape-map-field__hint">Select one or more projects to filter the map arcs.</p>
    </div>
  </div>

  <div class="landscape-map-dashboard__map-wrap">
    <div class="landscape-map-legend">
      <span><i class="landscape-map-legend__dot landscape-map-legend__dot--project"></i> Project origin</span>
      <span><i class="landscape-map-legend__line"></i> Project to activity</span>
    </div>
    <div id="landscape-map" class="landscape-map" aria-label="Map of project and activity links"></div>
    <div class="landscape-map-popup-card" data-map-popup hidden></div>
  </div>

  <div class="landscape-map-dashboard__error" data-map-error hidden></div>
</div>
